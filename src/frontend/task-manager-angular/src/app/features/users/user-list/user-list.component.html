<div *ngIf="showProgressBar === true" id="loding_div">
  <mat-progress-bar mode="indeterminate" value="100"></mat-progress-bar>
</div>

<div class="toolbar-filters">

  <div class="filters-left">

  </div>

  <div class="filters-right">
    <button mat-raised-button color="primary" (click)="goToUserCreate()">
      New User
    </button>
  </div>

</div>

<div class="mat-elevation-z8">

  <table mat-table [dataSource]="users" class="mat-table">

    <!-- CreatedAt -->
    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef> Creation Date </th>
      <td mat-cell *matCellDef="let user"> {{ user.createdAt | date:'short' }} </td>
    </ng-container>

    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let user"> {{user.id}} </td>
    </ng-container>

    <!-- Name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let user"> {{user.name}} </td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef> Email </th>
      <td mat-cell *matCellDef="let user"> {{user.email}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
